# PSS Lead CRM — Render Blueprint (free tier)
# Dashboard → New + → Blueprint → Connect GitHub repo → Apply

databases:
  - name: pss-crm-db
    databaseName: pss_crm
    user: crm
    plan: free

services:
  - type: web
    name: pss-crm-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install && npm run build -w apps/api
    startCommand: cd apps/api && npm run render:setup && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: pss-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USE_REDIS
        value: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_API_URL
        sync: false

  - type: web
    name: pss-crm-web
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install && npm run build -w apps/web
    startCommand: npm run start -w apps/web
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
